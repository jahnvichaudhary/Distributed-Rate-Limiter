server:
  port: 8080

spring:
  application:
    name: rate-limiter
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000
      lettuce:
        pool:
          max-active: 64
          max-idle: 32
          min-idle: 8

ratelimiter:
  # default policy if none specified per-key
  default-policy: sliding_window
  default-capacity: 100
  default-refill-per-second: 50
  default-window-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
